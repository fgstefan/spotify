query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
          }
        }
      }
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
    }
  }
  cartTransform {
    metafield(namespace: "reserve-deposit", key: "config") {
      value
    }
  }
}
